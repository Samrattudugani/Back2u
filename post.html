<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posts - Back2u</title>
<link rel="stylesheet" href="style.css">
<style>
  body { padding-bottom: 60px; }
  .orb1{position:fixed;width:600px;height:600px;background:#00d4ff;top:-300px;right:-200px;border-radius:50%;filter:blur(140px);opacity:0.05;pointer-events:none;z-index:0;}
  .orb2{position:fixed;width:400px;height:400px;background:#7c3aed;bottom:-200px;left:-100px;border-radius:50%;filter:blur(120px);opacity:0.06;pointer-events:none;z-index:0;}
  .page-wrap { position: relative; z-index: 1; }

  .section-header {
    padding: 28px 24px 16px;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .section-header h2 {
    font-size: 1.3rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .post-count {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* Profile modal body */
  .modal-content.profile-mc {
    height: auto;
    max-height: 90vh;
  }
</style>
</head>
<body>

<div class="orb1"></div>
<div class="orb2"></div>

<div class="page-wrap">

<!-- NAV -->
<nav class="b2u-nav">
  <a href="index.html" class="b2u-logo">Back2u</a>
  <div class="b2u-nav-right">
    <div class="user-chip">
      <div class="dot"></div>
      <span id="profileDisplay">Loading...</span>
    </div>
    <button class="btn btn-ghost" onclick="togglePostForm()">+ New Post</button>
    <button class="btn btn-ghost" onclick="showProfile()">👤 Profile</button>
    <button class="btn btn-danger" onclick="logout()">Sign Out</button>
  </div>
</nav>

<!-- CREATE POST FORM -->
<div class="form-section" id="postFormSection" style="display:none;margin-top:24px;">
  <h2>📝 Report Lost / Found Item</h2>
  <form id="postForm" enctype="multipart/form-data">
    <div class="form-group">
      <label>Item Name</label>
      <input type="text" id="postTitle" placeholder="e.g. Blue Backpack, Black Wallet, iPhone 14" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="postDescription" placeholder="Describe the item — color, brand, special marks, condition..." required></textarea>
    </div>
    <div class="form-group">
      <label>Last Seen Location</label>
      <input type="text" id="postLocation" placeholder="Where was it lost/found?" required>
    </div>
    <div class="form-group">
      <label>Contact Phone (WhatsApp)</label>
      <input type="text" id="postPhone" placeholder="+91 XXXXX XXXXX (optional)">
    </div>
    <div class="image-upload">
      <label for="postImage" class="upload-label">📸 Upload Photo</label>
      <input type="file" id="postImage" accept="image/*" style="display:none;">
      <img id="imagePreview" style="display:none;">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;margin-top:8px;justify-content:center;font-size:15px;">Submit Post</button>
  </form>
</div>

<!-- SEARCH -->
<div class="search-container" style="padding-top:28px;">
  <input type="text" id="searchBar" placeholder="Search items, locations...">
  <button class="btn btn-ghost" onclick="resetSearch()">Clear</button>
  <button class="btn btn-ghost" onclick="refreshPosts()">🔄 Refresh</button>
</div>

<!-- SECTION HEADER -->
<div class="section-header">
  <h2>📋 Recent Posts</h2>
  <span class="post-count" id="postCountLabel">Loading...</span>
</div>

<!-- POSTS GRID -->
<div class="posts-container" id="postsGrid">
  <div class="loading">⏳ Loading posts...</div>
</div>

<!-- UNDO POPUP -->
<div id="undoPopup" style="display:none;">
  Item marked as found.
</div>

<!-- CHAT MODAL -->
<div id="chatModal" class="modal" onclick="if(event.target===this)closeChat()">
  <div class="modal-content">
    <div class="modal-header">
      <span id="chatTitle">💬 Chat</span>
      <span class="close" onclick="closeChat()">×</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Type a message...">
      <button class="send-btn" onclick="sendMessage()">Send ↑</button>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal" onclick="closeProfileOnBackground(event)">
  <div class="modal-content profile-mc">
    <div class="modal-header">
      <span>👤 My Profile</span>
      <span class="close" onclick="closeProfile()">×</span>
    </div>
    <div class="profile-modal-body">
      <div id="profileDetails" class="profile-details-box"></div>
      <div class="profile-field">
        <label>Username</label>
        <input type="text" id="editUsername">
      </div>
      <div class="profile-field">
        <label>Email</label>
        <input type="email" id="editEmail" readonly style="opacity:0.5;cursor:not-allowed;">
      </div>
      <div class="profile-field">
        <label>Phone</label>
        <input type="text" id="editPhone">
      </div>
      <div class="profile-actions">
        <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
        <button class="btn btn-ghost" onclick="closeProfile()">Cancel</button>
      </div>
    </div>
  </div>
</div>

</div><!-- end page-wrap -->

<script src="script.js"></script>
<script>
  // Reliable post form toggle — overrides any timing issues
  function togglePostForm() {
    const form = document.getElementById('postFormSection');
    if (!form) return;
    if (form.style.display === 'none' || form.style.display === '') {
      form.style.display = 'block';
      form.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      form.style.display = 'none';
    }
  }
</script>
</body>
</html>
